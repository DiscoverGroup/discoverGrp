<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Optimized font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Newsreader:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://js.stripe.com https://connect.facebook.net 'unsafe-eval' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://js.stripe.com https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob:
        https://*.stripe.com https://*.stripecdn.com https://*.stripe.network
        https://js.stripe.com https://q.stripe.com https://b.stripecdn.com
        https://m.stripe.network https://m.stripe.com
        https://*.supabase.co
        https://placehold.co
        https://images.unsplash.com
        https://i.pravatar.cc
        https://*.r2.cloudflarestorage.com
        https://*.r2.dev
        https://*.cloudflare.com
        https://res.cloudinary.com
        https://*.fbcdn.net https://*.facebook.com;
      media-src 'self' https://*.supabase.co https://*.r2.cloudflarestorage.com https://*.r2.dev https://res.cloudinary.com blob: data:;
      connect-src 'self' ws://localhost:5173 http://localhost:4000
        https://discovergroup-api-production.up.railway.app
        https://*.stripe.com https://*.stripecdn.com https://*.stripe.network
        https://*.supabase.co
        https://*.r2.cloudflarestorage.com
        https://*.r2.dev
        https://res.cloudinary.com
        https://api.cloudinary.com
        https://graph.facebook.com https://*.facebook.com;
      frame-src 'self' https://*.stripe.com https://www.facebook.com;
      worker-src 'self' blob:;
      child-src 'self' https://*.stripe.com https://www.facebook.com;
    ">
    <title>Discover Group</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Facebook Messenger Customer Chat Widget -->
    <!-- Requires VITE_FB_PAGE_ID env var to be set in Netlify -->
    <div id="fb-root"></div>
    <script>
      window.fbAsyncInit = function() {
        FB.init({
          xfbml            : true,
          version          : 'v19.0'
        });
      };

      (function(d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = 'https://connect.facebook.net/en_US/sdk/xfbml.customerchat.js';
        fjs.parentNode.insertBefore(js, fjs);
      }(document, 'script', 'facebook-jssdk'));
    </script>

    <!-- Messenger chat bubble — hidden until VITE_FB_PAGE_ID is set -->
    <div
      class="fb-customerchat"
      attribution="biz_inbox"
      page_id="%VITE_FB_PAGE_ID%"
      theme_color="#e63946"
      logged_in_greeting="Hi! How can we help you plan your tour? 😊"
      logged_out_greeting="Hi! How can we help you plan your tour? 😊"
    ></div>
  </body>
</html>
