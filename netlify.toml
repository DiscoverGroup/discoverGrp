[build]
  base = ""
  command = "npm run build:app"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"
  # Set VITE_API_BASE_URL in Netlify UI (Railway production API URL)
  # Admin URL
  VITE_ADMIN_URL = "https://admin--discovergrp.netlify.app"
  # IMPORTANT: Set VITE_STRIPE_PUBLISHABLE_KEY in Netlify Dashboard > Site settings > Environment variables
  # DO NOT commit API keys to git - they belong in secure environment variables only
  # NOTE: Supabase environment variables removed (R2 is used for storage)

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://js.stripe.com 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://js.stripe.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.stripe.com https://*.stripecdn.com https://*.stripe.network https://js.stripe.com https://q.stripe.com https://b.stripecdn.com https://m.stripe.network https://m.stripe.com https://*.supabase.co https://placehold.co https://images.unsplash.com https://i.pravatar.cc https://*.r2.cloudflarestorage.com https://*.r2.dev https://*.cloudflare.com https://res.cloudinary.com; media-src 'self' https://*.supabase.co https://*.r2.cloudflarestorage.com https://*.r2.dev https://res.cloudinary.com blob: data:; connect-src 'self' wss://* ws://localhost:5173 http://localhost:4000 https://discovergroup-api-production.up.railway.app https://*.stripe.com https://*.stripecdn.com https://*.stripe.network https://*.supabase.co https://*.r2.cloudflarestorage.com https://*.r2.dev https://res.cloudinary.com https://api.cloudinary.com; frame-src 'self' https://*.stripe.com; worker-src 'self' blob:; child-src 'self' https://*.stripe.com;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200